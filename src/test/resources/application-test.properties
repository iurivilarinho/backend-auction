# Overrides de teste: banco H2 em memoria e seed desligado. As demais propriedades vem
# do application.properties principal (resolvido normalmente quando o profile "test" esta ativo).
spring.datasource.url=jdbc:h2:mem:auction-test;MODE=PostgreSQL;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

integration.seed.enabled=false
integration.scheduler.enabled=false
auction.scheduler.enabled=false
auction.import.fipe.enabled=false
detran.panel.cpf=
detran.panel.password=
