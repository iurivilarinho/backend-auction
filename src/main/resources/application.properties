spring.application.name=leilao
server.port=${SERVER_PORT:8087}
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:JKS}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:keystore.jks}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:springboot}
server.ssl.key-password=${SERVER_SSL_KEY_PASSWORD:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/auction-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

auction.provider.default=DETRAN_MG
# Toda informacao do provedor passa pelo modulo de integracao: o scraper direto fica desligado e
# a coleta recorrente (a cada 15 min, incremental) e feita pelas integracoes agendadas.
auction.scheduler.enabled=${AUCTION_SCHEDULER_ENABLED:false}
auction.scheduler.interval-ms=${AUCTION_SCHEDULER_INTERVAL_MS:900000}
auction.scheduler.initial-delay-ms=${AUCTION_SCHEDULER_INITIAL_DELAY_MS:15000}
auction.import.fipe.enabled=${AUCTION_IMPORT_FIPE_ENABLED:false}
auction.source.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0 Safari/537.36
auction.source.timeout-ms=${AUCTION_SOURCE_TIMEOUT_MS:30000}
auction.source.validate-tls-certificates=${AUCTION_SOURCE_VALIDATE_TLS_CERTIFICATES:false}
# Quantos leiloes tem os lotes coletados a cada execucao da integracao de lotes.
# 0 (ou negativo) = todos os leiloes publicados. Antes era 3, o que deixava a maioria dos
# editais (ex.: Uberlandia) sem veiculos: o edital era criado mas os lotes nunca eram coletados.
auction.feed.max-auctions=${AUCTION_FEED_MAX_AUCTIONS:0}

# Coleta recorrente do provedor via modulo de integracao (integracoes agendadas).
integration.scheduler.enabled=${INTEGRATION_SCHEDULER_ENABLED:true}
integration.scheduler.interval-ms=${INTEGRATION_SCHEDULER_INTERVAL_MS:900000}
integration.scheduler.initial-delay-ms=${INTEGRATION_SCHEDULER_INITIAL_DELAY_MS:20000}

# URL do proprio backend (as integracoes consomem o provedor pelo feed JSON exposto aqui).
app.self-url=${APP_SELF_URL:http://localhost:8087}

# Credenciais do painel DETRAN-MG (login do arrematante) cadastradas automaticamente pelo seed.
detran.panel.cpf=${DETRAN_PANEL_CPF:13953129660}
detran.panel.password=${DETRAN_PANEL_PASSWORD:@40028922Aa}

# Chave AES-256 (base64 de 32 bytes) usada para criptografar segredos de credenciais das integracoes.
# Em producao deve vir de variavel de ambiente; o valor abaixo e apenas para desenvolvimento com H2.
integration.crypto.key=${INTEGRATION_CRYPTO_KEY:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
# Seed automatico da integracao com o provedor inicial (DETRAN_MG) quando o banco esta vazio.
integration.seed.enabled=${INTEGRATION_SEED_ENABLED:true}

# ===== BI / IA (assistente do B.I. em linguagem natural) =====
# Provedor padrao enquanto nao houver configuracao salva: 'claude' (CLI local, sem token),
# 'ollama', 'openai', 'gemini', 'anthropic' ou 'custom'. Editavel em runtime na tela.
bi.assistant.provider=${BI_ASSISTANT_PROVIDER:claude}
# Comando/binario do Claude CLI (resolve no PATH; no Windows roda via cmd.exe /c).
bi.assistant.claude.command=${BI_CLAUDE_COMMAND:claude}
# Ollama (opcional): usado se o provedor for 'ollama' e nao houver baseUrl/model salvos.
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:llama3}

api.security.token.secret=${API_SECURITY_TOKEN_SECRET:dev-secret}
api.jwt.secret=${API_JWT_SECRET:dev-secret}
api.jwt.expiration=${API_JWT_EXPIRATION:7}
api.jwt.expiration.recovery.password=${API_JWT_RECOVERY_EXPIRATION:1}
