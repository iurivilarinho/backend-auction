spring.application.name=leilao
server.port=${SERVER_PORT:8087}
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:JKS}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:keystore.jks}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:springboot}
server.ssl.key-password=${SERVER_SSL_KEY_PASSWORD:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/auction-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

auction.provider.default=DETRAN_MG
auction.scheduler.enabled=${AUCTION_SCHEDULER_ENABLED:false}
auction.import.fipe.enabled=${AUCTION_IMPORT_FIPE_ENABLED:false}
auction.source.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0 Safari/537.36
auction.source.timeout-ms=${AUCTION_SOURCE_TIMEOUT_MS:30000}
auction.source.validate-tls-certificates=${AUCTION_SOURCE_VALIDATE_TLS_CERTIFICATES:false}

# Chave AES-256 (base64 de 32 bytes) usada para criptografar segredos de credenciais das integracoes.
# Em producao deve vir de variavel de ambiente; o valor abaixo e apenas para desenvolvimento com H2.
integration.crypto.key=${INTEGRATION_CRYPTO_KEY:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
# Seed automatico da integracao com o provedor inicial (DETRAN_MG) quando o banco esta vazio.
integration.seed.enabled=${INTEGRATION_SEED_ENABLED:true}

api.security.token.secret=${API_SECURITY_TOKEN_SECRET:dev-secret}
api.jwt.secret=${API_JWT_SECRET:dev-secret}
api.jwt.expiration=${API_JWT_EXPIRATION:7}
api.jwt.expiration.recovery.password=${API_JWT_RECOVERY_EXPIRATION:1}
